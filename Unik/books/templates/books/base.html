<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Онлайн Библиотека</title>
    <style>
        /* Супер-яркий фон и шрифты */
        body { 
            font-family: 'Arial Black', Arial, sans-serif; 
            margin: 0; 
            background-color: #FFD500; /* Яркий желтый */
            color: #000; 
            line-height: 1.6; 
        }
        
        /* Кислотная навигация */
        nav { 
            background: #00E5FF; /* Яркий циан */
            padding: 15px 30px; 
            border-bottom: 5px solid #000;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        nav a { 
            text-decoration: none; 
            color: #000; 
            font-weight: 900;
            font-size: 1.1em;
            text-transform: uppercase;
            transition: 0.1s;
        }
        nav a:hover { color: #FF007F; }
        
        /* Поиск */
        nav form { display: flex; gap: 10px; flex-grow: 1; max-width: 400px; }
        nav input[type="text"] { 
            padding: 10px 15px; 
            border: 3px solid #000; 
            border-radius: 0; 
            width: 100%;
            font-weight: bold;
        }
        
        .greeting { color: #000; font-weight: 900; margin-left: auto; font-size: 1.1em; text-transform: uppercase; }
        
        /* Жирные, яркие кнопки с резкой тенью */
        .btn { 
            display: inline-block; 
            background: #FF007F; /* Ярко-розовый */
            color: #FFF; 
            padding: 10px 20px; 
            text-decoration: none; 
            border: 3px solid #000;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.1s; 
        }
        .btn:active { 
            transform: translate(4px, 4px); 
            box-shadow: 0px 0px 0px #000; 
        }
        .btn-danger { background: #FF3333; }
        .btn-secondary { background: #B200FF; color: #FFF; }
        .btn-green { background: #00FF00; color: #000; }
        
        /* Основной контейнер с жесткой тенью */
        .container { 
            max-width: 900px; 
            margin: 40px auto; 
            padding: 40px; 
            background: #FFF; 
            border: 5px solid #000;
            box-shadow: 12px 12px 0px #000; 
        }
        
        /* Стилизация форм без поломки логики */
        form p { margin-bottom: 20px; font-weight: bold; font-family: Arial, sans-serif; }
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 3px solid #000; 
            background: #FFF;
            font-weight: bold;
            box-sizing: border-box;
            margin-top: 5px;
        }
        input:focus, textarea:focus { background: #00E5FF; outline: none; }
        
        /* Списки книг и отзывов */
        ul { list-style: none; padding: 0; }
        li { 
            background: #FFF; 
            border: 3px solid #000; 
            margin-bottom: 15px; 
            padding: 15px; 
            box-shadow: 6px 6px 0px #B200FF;
            font-family: Arial, sans-serif;
        }
        li a { text-decoration: none; color: #B200FF; font-weight: 900; font-size: 1.2em; font-family: 'Arial Black', sans-serif;}
        li a:hover { color: #FF007F; }
        
        hr { border: 0; height: 4px; background: #000; margin: 30px 0; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'book_list' %}" style="font-size: 1.3em;">📚 Главная</a>

        <form method="get" action="{% url 'book_list' %}">
            <input type="text" name="q" placeholder="ПОИСК КНИГИ..." value="{{ request.GET.q|default:'' }}">
            <button type="submit" class="btn btn-green">Найти</button>
        </form>

        {% if user.is_authenticated %}
            <span class="greeting">ПРИВЕТ, {{ user.username }}! 🤘</span>

            <form method="post" action="{% url 'logout' %}" style="display: inline-block; margin-left: 15px;">
                {% csrf_token %}
                <button type="submit" class="btn btn-secondary">ВЫЙТИ</button>
            </form>
        {% else %}
            <div style="margin-left: auto; display: flex; gap: 15px;">
                <a href="{% url 'login' %}" class="btn" style="box-shadow: none;">ВОЙТИ</a>
                <a href="{% url 'register' %}" class="btn btn-green" style="box-shadow: none;">РЕГИСТРАЦИЯ</a>
            </div>
        {% endif %}
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
