{% extends 'books/base.html' %}
{% block content %}
    <h1 style="color: #FF007F; text-transform: uppercase; margin-top: 0;">СПИСОК КНИГ 📖</h1>
    <ul>
        {% for book in books %}
            <li>
                <a href="{% url 'book_detail' book.pk %}">{{ book.title }}</a> 
                <span style="font-weight: bold; margin-left: 10px;">— {{ book.author }} ({{ book.genre }})</span>
            </li>
        {% empty %}
            <div style="padding: 20px; font-weight: bold; background: #00E5FF; border: 3px solid #000; box-shadow: 6px 6px 0px #000;">
                <h2>Книг пока нет! 😱</h2>
                <p>Давай добавим первую!</p>
            </div>
        {% endfor %}
    </ul>
{% endblock %}
