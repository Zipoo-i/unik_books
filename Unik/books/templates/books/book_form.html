{% extends 'books/base.html' %}
{% block content %}
    <h1 style="color: #00E5FF; background: #000; padding: 10px; display: inline-block; text-transform: uppercase;">
        {% if form.instance.pk %}
            РЕДАКТИРОВАТЬ КНИГУ 🛠
        {% else %}
            ДОБАВИТЬ КНИГУ ➕
        {% endif %}
    </h1>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="margin-top: 30px;">
            <button type="submit" class="btn btn-green">СОХРАНИТЬ</button>
            <a href="{% url 'book_list' %}" class="btn btn-secondary">ОТМЕНА</a>
        </div>
    </form>
{% endblock %}
